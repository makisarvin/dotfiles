###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bindd = $mainMod, return, Open Terminal, exec, $terminal
bindd = $mainMod SHIFT, return, Open Terminal Vertically, exec, hyprctl dispatch layoutmsg preselect d && $terminal 
bindd = $mainMod, Q, Kill active window, killactive,
bindd = $mainMod, M, Restart hyprland, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = $mainMod, E, Open File Manager, exec, $fileManager
bindd = $mainMod, F, Toggle floating window, togglefloating,
bindd = $mainMod, space, Open search menu, exec, $menu
bindd = $mainMod, P, pseudo?, pseudo, # dwindle
bindd = $mainMod, J, Toggle split layout, layoutmsg, togglesplit # dwindle
bindd = $mainMod, B, Open Browser, exec, $browser
bindd = $mainMod, C, Open Visual Code Editor, exec, code .
bindd = $mainMod, R, Open Roblox Studio, exec, flatpak run org.vinegarhq.Vinegar
bindd = $mainMod, slash, Open shortcut search, exec, hyprbind 
# Print screen and region
bindd = , PRINT, Print active window, exec, hyprshot -m window
bindd = shift, PRINT, Print region, exec, hyprshot -m region

#Screen saver
bindd = $SUPER_SHIFT, l, Enter screensaver, exec, hyprlock
bindd = $mainMode, V, Open clipboard menu, exec, cliphist list | rofi -dmenu p "Clipboard" -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy

# Move focus with mainMod + arrow keys
bindd = $mainMod, left, Move focus to left, movefocus, l
bindd = $mainMod, right, Move focus to right, movefocus, r
bindd = $mainMod, up, Move focus to up, movefocus, u
bindd = $mainMod, down, Move focus to down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Switch to workspace 1,  workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3,  workspace, 3
bindd = $mainMod, 4, Switch to workspace 4,  workspace, 4
bindd = $mainMod, 5, Switch to workspace 5,  workspace, 5
bindd = $mainMod, 6, Switch to workspace 6,  workspace, 6
bindd = $mainMod, 7, Switch to workspace 7,  workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9,  workspace, 9
bindd = $mainMod, 0, Switch to workspace 10,  workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2,  movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3,  movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4,  movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5,  movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6,  movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7,  movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8,  movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9,  movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10,  movetoworkspace, 10

# Example special workspace (scratchpad)
bindd = $mainMod, S, Bring window from scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move window to scratchpad, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, Move to next window (scroll), workspace, e+1
bindd = $mainMod, mouse_up, Move to previous window (scroll), workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
binddm = $mainMod, mouse:272, Drag Window, movewindow
binddm = $mainMod, mouse:273, Resize Window, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

